# LookIn Configuration
# YAML-controlled interactive architecture drill-down viewer
# PNG-first mode: all diagrams are pre-rendered PNGs with clickRegion overlays

title: "JiraDa"
subtitle: "Click any node to drill deeper"
theme: handDrawn
languages: [en, hu]

# ── Sources: connected project repos ────────────────────────────
sources:
  jiramntr:
    label: "Jiramntr"
    label_hu: "Jiramntr"
    path: "../jiramntr"
    catalogs: "internal/catalog/*.json"
    diagrams: "docs/architecture/*.mmd"
    color: "#3498db"

  johanna:
    label: "Johanna"
    label_hu: "Johanna"
    path: "../johanna"
    diagrams: "docs/*.mmd"
    color: "#27ae60"

  aichat:
    label: "AI-Chat"
    label_hu: "AI-Chat"
    path: "../aichat"
    color: "#9b59b6"

  mcp-forge:
    label: "MCP-Forge"
    label_hu: "MCP-Forge"
    path: "../mcp-forge"
    color: "#e74c3c"

  datagrid:
    label: "Datagrid"
    label_hu: "Datagrid"
    path: "../datagrid"
    diagrams: "docs/*.mmd"
    color: "#e67e22"

  lookin:
    label: "LookIn"
    label_hu: "LookIn"
    path: "."
    color: "#1abc9c"

# ── Table of Contents (Curated Navigation) ──────────────────────
toc:
  - group: "Core Platform"
    group_hu: "Alapplatform"
    icon: "ph-buildings"
    layers:
      - enterprise
      - jira_da_arch
      - deployment

  - group: "Applications"
    group_hu: "Alkalmazások"
    icon: "ph-app-window"
    layers:
      - overview
      - johanna
      - application
      - security

  - group: "Intelligence"
    group_hu: "Intelligencia"
    icon: "ph-brain"
    layers:
      - ai_pipeline
      - mcp_forge
      - mcp_detail
      - rag_detail

  - group: "Data Layer"
    group_hu: "Adatréteg"
    icon: "ph-database"
    layers:
      - architecture
      - star_schema
      - ragdb_schema
      - ingestion

